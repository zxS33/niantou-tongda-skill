<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>念头通达 Skill</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #10231f; background: #f7f3eb; }
      main { max-width: 920px; margin: 0 auto; padding: 72px 24px; }
      img { width: min(760px, 100%); display: block; margin-bottom: 48px; }
      h1 { font-size: clamp(42px, 8vw, 84px); line-height: 1; margin: 0 0 20px; }
      p { font-size: 22px; line-height: 1.65; max-width: 760px; }
      code { background: #e8dfcf; padding: 3px 6px; border-radius: 4px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-top: 36px; }
      .item { border: 1px solid #d7b56d; padding: 18px; border-radius: 8px; background: #fffaf0; }
    </style>
  </head>
  <body>
    <main>
      <img src="../assets/logo_main.svg" alt="念头通达 Skill">
      <h1>念头通达 Skill</h1>
      <p>面向 AI Agent 的工程心法：明镜看事实，边界收能动，本心做决断，无住去行动，破境做探针，长线守复利，闭环收念头。</p>
      <p><code>npx niantou-tongda-skill install --target codex --scope user</code></p>
      <div class="grid">
        <div class="item">工程调试通达</div>
        <div class="item">产品设计迭代</div>
        <div class="item">范围取舍决断</div>
        <div class="item">长线项目推进</div>
      </div>
    </main>
  </body>
</html>
